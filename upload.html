<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 올리기 · Haisley Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --white: #ffffff;
    --ink: #0a0a0a;
    --ink-soft: #888;
    --ink-faint: #c0c0c0;
    --border: #ebebeb;
    --bg: #f9f9f9;
    --font: 'Inter', sans-serif;
  }

  body {
    background: var(--white);
    font-family: var(--font);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* Header */
  header {
    width: 100%;
    height: 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
  }

  .logo em { font-style: italic; }

  .back-link {
    position: absolute;
    left: 20px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 440px;
    padding: 0 24px;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 12px;
    font-weight: 300;
    color: var(--ink-soft);
    margin-bottom: 32px;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  /* Drop Zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 24px;
    position: relative;
    background: var(--bg);
  }

  .drop-zone.dragover {
    border-color: var(--ink);
    background: #f4f4f4;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 14px;
    opacity: 0.25;
  }

  .drop-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .drop-hint {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.5px;
  }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-bottom: 24px;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .preview-wrap img {
    width: 100%;
    max-height: 320px;
    object-fit: cover;
    display: block;
  }

  .preview-reset {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 11px;
    font-family: var(--font);
    letter-spacing: 0.5px;
    cursor: pointer;
  }

  /* Fields */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--ink);
    background: var(--white);
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--ink);
  }

  .field textarea {
    resize: none;
    height: 80px;
    line-height: 1.6;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }

  .submit-btn:hover { opacity: 0.8; }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Progress */
  .progress-wrap {
    display: none;
    margin-top: 20px;
  }

  .progress-bar-bg {
    height: 1px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 999px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* Result */
  .result-box {
    display: none;
    padding: 16px;
    border-radius: 4px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
    line-height: 1.6;
  }

  .result-box.success {
    background: #f0f7f0;
    color: #2a5c2a;
    border: 1px solid #c8e0c8;
  }

  .result-box.error {
    background: #fdf0f0;
    color: #9b2222;
    border: 1px solid #f5c6c6;
  }
</style>
</head>
<body>

<header>
  <a class="back-link" href="gallery.html">← 갤러리</a>
  <a class="logo" href="gallery.html">Haisley <em>Gallery</em></a>
</header>

<div class="card">
  <div class="card-title">사진 올리기</div>
  <div class="card-desc">업로드한 사진은 관리자 검토 후 갤러리에 게시됩니다.</div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <div class="drop-icon">📷</div>
    <div class="drop-label">사진을 선택하세요</div>
    <div class="drop-hint">JPG · PNG · HEIC · 최대 10MB</div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="">
    <button class="preview-reset" onclick="resetFile()">다시 선택</button>
  </div>

  <div class="field">
    <label>제목 <span style="font-weight:300;text-transform:none;letter-spacing:0;color:var(--ink-faint)">(선택)</span></label>
    <input type="text" id="caption" placeholder="사진 제목을 입력하세요">
  </div>

  <button class="submit-btn" id="submitBtn" onclick="uploadPhoto()">제출하기</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">업로드 중…</div>
  </div>

  <div class="result-box" id="resultBox"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpVYwXbGYxjD5qQkIkUdlDVSisLPYzvR8",
    authDomain: "gallery-228e7.firebaseapp.com",
    databaseURL: "https://gallery-228e7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gallery-228e7",
    storageBucket: "gallery-228e7.firebasestorage.app",
    messagingSenderId: "606056829643",
    appId: "1:606056829643:web:f78986e93d0dbb14c1814e"
  };

  const CLOUDINARY_CLOUD = 'dnegdhlrs';
  const CLOUDINARY_PRESET = 'nqnwhcnn';

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let selectedFile = null;

  const fileInput = document.getElementById('fileInput');
  const dropZone  = document.getElementById('dropZone');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) { showResult('error', '이미지 파일만 업로드할 수 있습니다.'); return; }
    if (file.size > 10 * 1024 * 1024) { showResult('error', '파일 크기가 10MB를 초과합니다.'); return; }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      dropZone.style.display = 'none';
      previewWrap.style.display = 'block';
    };
    reader.readAsDataURL(file);
    document.getElementById('resultBox').style.display = 'none';
  }

  window.resetFile = function() {
    selectedFile = null;
    fileInput.value = '';
    previewImg.src = '';
    previewWrap.style.display = 'none';
    dropZone.style.display = 'block';
  };

  // 이미지 압축
  function compressImage(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 1400;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', 0.85);
      };
      img.src = url;
    });
  }

  window.uploadPhoto = async function() {
    if (!selectedFile) { showResult('error', '사진을 먼저 선택해주세요.'); return; }

    const submitBtn    = document.getElementById('submitBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel= document.getElementById('progressLabel');

    submitBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressLabel.textContent = '이미지 압축 중…';
    progressFill.style.width = '10%';

    try {
      // 1. 압축
      const compressed = await compressImage(selectedFile);
      progressFill.style.width = '20%';
      progressLabel.textContent = 'Cloudinary 업로드 중…';

      // 2. Cloudinary 업로드 (XMLHttpRequest — 진행률 표시)
      const formData = new FormData();
      formData.append('file', compressed);
      formData.append('upload_preset', CLOUDINARY_PRESET);
      formData.append('folder', 'haisley-gallery');

      const imageUrl = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);

        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round(e.loaded / e.total * 70) + 20;
            progressFill.style.width = pct + '%';
            progressLabel.textContent = `업로드 중… ${pct}%`;
          }
        };

        xhr.onload = () => {
          if (xhr.status === 200) {
            const res = JSON.parse(xhr.responseText);
            resolve(res.secure_url);
          } else {
            reject(new Error('Cloudinary 업로드 실패: ' + xhr.responseText));
          }
        };

        xhr.onerror = () => reject(new Error('네트워크 오류'));
        xhr.send(formData);
      });

      progressFill.style.width = '90%';
      progressLabel.textContent = '갤러리에 등록 중…';

      // 3. Firebase DB에 메타데이터 저장
      const newRef = push(ref(db, 'photos'));
      await set(newRef, {
        imageUrl,
        caption:    document.getElementById('caption').value.trim(),
        status:     'pending',
        uploadedAt: Date.now()
      });

      progressFill.style.width = '100%';
      progressLabel.textContent = '완료';

      setTimeout(() => {
        progressWrap.style.display = 'none';
        showResult('success', '제출이 완료됐습니다.<br>관리자 검토 후 갤러리에 게시됩니다.');
        submitBtn.disabled = false;
        window.resetFile();
        document.getElementById('caption').value = '';
      }, 500);

    } catch (err) {
      console.error(err);
      showResult('error', '오류가 발생했습니다. 다시 시도해주세요.<br><small>' + err.message + '</small>');
      submitBtn.disabled = false;
      document.getElementById('progressWrap').style.display = 'none';
    }
  };

  function showResult(type, msg) {
    const box = document.getElementById('resultBox');
    box.className = 'result-box ' + type;
    box.innerHTML = msg;
    box.style.display = 'block';
  }
</script>

</body>
</html>
