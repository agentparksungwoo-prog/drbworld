<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 올리기 · Haisley Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #fff9f0;
    --white: #ffffff;
    --ink: #3a2d1e;
    --ink-soft: #9a8878;
    --border: #f0e0cc;
    --accent: #ff8fab;
    --accent2: #ffb347;
    --accent3: #7ec8e3;
    --font: 'Gaegu', 'Nanum Gothic', cursive;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* Header */
  header {
    width: 100%;
    height: 60px;
    border-bottom: 2px dashed var(--border);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 16px;
    margin-bottom: 32px;
    background: rgba(255,249,240,0.95);
  }

  .back-link {
    grid-column: 1;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    text-decoration: none;
    white-space: nowrap;
  }

  .logo {
    grid-column: 2;
    font-family: var(--font);
    font-weight: 700;
    font-size: 18px;
    color: var(--ink);
    text-decoration: none;
    white-space: nowrap;
    text-align: center;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
  }

  .card-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--ink);
  }

  .card-desc {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* Drop Zone */
  .drop-zone {
    border: 3px dashed var(--accent);
    border-radius: 20px;
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    background: #fff0f5;
    margin-bottom: 20px;
    transition: background 0.2s;
  }

  .drop-zone:active { background: #ffe0ec; }

  .drop-icon { font-size: 48px; margin-bottom: 12px; }
  .drop-label { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .drop-hint { font-size: 13px; color: var(--ink-soft); }

  /* Preview */
  .preview-wrap {
    display: none;
    margin-bottom: 20px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--border);
    position: relative;
    box-shadow: 0 4px 0 #e8cdb0;
  }

  .preview-wrap img {
    width: 100%; max-height: 300px;
    object-fit: cover; display: block;
  }

  .preview-reset {
    position: absolute; top: 10px; right: 10px;
    background: var(--accent); color: #fff;
    border: 2px solid #ff6b9d;
    border-radius: 999px; padding: 5px 14px;
    font-size: 13px; font-family: var(--font);
    font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 0 #e05580;
  }

  /* Fields */
  .field { margin-bottom: 16px; }

  .field label {
    display: block; font-size: 15px;
    font-weight: 700; color: var(--ink);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%; padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px; font-size: 15px;
    font-family: var(--font); color: var(--ink);
    background: var(--white); outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--accent); }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 15px;
    background: var(--accent2);
    color: var(--white); border: 2px solid #e09030;
    border-radius: 999px; font-size: 17px;
    font-weight: 700; font-family: var(--font);
    cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 0 #c07820;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .submit-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #c07820;
  }

  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  .progress-wrap { display: none; margin-top: 20px; }

  .progress-bar-bg {
    height: 12px; background: #ffe0cc;
    border-radius: 999px; overflow: hidden;
    margin-bottom: 8px;
    border: 2px solid var(--border);
  }

  .progress-bar-fill {
    height: 100%; background: var(--accent);
    border-radius: 999px;
    transition: width 0.3s ease; width: 0%;
  }

  .progress-label {
    font-size: 14px; color: var(--ink-soft);
    text-align: center;
  }

  /* Result */
  .result-box {
    display: none; padding: 16px;
    border-radius: 16px; font-size: 15px;
    margin-top: 16px; text-align: center;
    line-height: 1.6; font-weight: 700;
    border: 2px solid;
  }

  .result-box.success {
    background: #f0fff4; color: #2a6a3a;
    border-color: #b0e0c0;
  }

  .result-box.error {
    background: #fff0f0; color: #9b2222;
    border-color: #f5c6c6;
  }
</style>
</head>
<body>

<header>
  <a class="back-link" href="gallery.html">← 갤러리</a>
  <a class="logo" href="gallery.html">🌸 Haisley</a>
  <span></span>
</header>

<div class="card">
  <div class="card-title">📸 사진 올리기</div>
  <div class="card-desc">사진을 올리면 선생님이 확인 후 갤러리에 올려줘요!</div>

  <!-- 숨긴 input, JS로 클릭 -->
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="drop-icon">🖼️</div>
    <div class="drop-label">여기를 눌러 사진 선택</div>
    <div class="drop-hint">사진첩에서 골라요 📱</div>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="">
    <button class="preview-reset" onclick="resetFile()">다시 선택</button>
  </div>

  <div class="field">
    <label>📝 사진 제목 <span style="font-weight:400;font-size:13px;color:var(--ink-soft)">(선택)</span></label>
    <input type="text" id="caption" placeholder="사진에 대해 한마디!">
  </div>

  <button class="submit-btn" id="submitBtn" onclick="uploadPhoto()">🚀 갤러리에 올리기!</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">올리는 중…</div>
  </div>

  <div class="result-box" id="resultBox"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpVYwXbGYxjD5qQkIkUdlDVSisLPYzvR8",
    authDomain: "gallery-228e7.firebaseapp.com",
    databaseURL: "https://gallery-228e7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gallery-228e7",
    storageBucket: "gallery-228e7.firebasestorage.app",
    messagingSenderId: "606056829643",
    appId: "1:606056829643:web:f78986e93d0dbb14c1814e"
  };

  const CLOUDINARY_CLOUD  = 'dnegdhlrs';
  const CLOUDINARY_PRESET = 'nqnwhcnn';

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let selectedFile = null;

  const fileInput   = document.getElementById('fileInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const dropZone    = document.getElementById('dropZone');

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) { showResult('error', '이미지 파일만 올릴 수 있어요!'); return; }
    if (file.size > 10 * 1024 * 1024) { showResult('error', '파일이 너무 커요! (10MB 이하)'); return; }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      dropZone.style.display = 'none';
      previewWrap.style.display = 'block';
    };
    reader.readAsDataURL(file);
    document.getElementById('resultBox').style.display = 'none';
  }

  window.resetFile = function() {
    selectedFile = null;
    fileInput.value = '';
    previewImg.src = '';
    previewWrap.style.display = 'none';
    dropZone.style.display = 'block';
  };

  function compressImage(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 1400;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', 0.85);
      };
      img.src = url;
    });
  }

  window.uploadPhoto = async function() {
    if (!selectedFile) { showResult('error', '사진을 먼저 선택해주세요! 📸'); return; }

    const submitBtn     = document.getElementById('submitBtn');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');

    submitBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressLabel.textContent = '사진 준비 중… 🎨';
    progressFill.style.width = '10%';

    try {
      const compressed = await compressImage(selectedFile);
      progressFill.style.width = '20%';
      progressLabel.textContent = '사진 올리는 중… 🚀';

      const formData = new FormData();
      formData.append('file', compressed);
      formData.append('upload_preset', CLOUDINARY_PRESET);
      formData.append('folder', 'haisley-gallery');

      const imageUrl = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round(e.loaded / e.total * 70) + 20;
            progressFill.style.width = pct + '%';
            progressLabel.textContent = `올리는 중… ${pct}% 🌈`;
          }
        };
        xhr.onload = () => {
          if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url);
          else reject(new Error('업로드 실패'));
        };
        xhr.onerror = () => reject(new Error('네트워크 오류'));
        xhr.send(formData);
      });

      progressFill.style.width = '90%';
      progressLabel.textContent = '거의 다 됐어요… ⭐';

      const newRef = push(ref(db, 'photos'));
      await set(newRef, {
        imageUrl,
        caption: document.getElementById('caption').value.trim(),
        status: 'pending',
        uploadedAt: Date.now()
      });

      progressFill.style.width = '100%';
      setTimeout(() => {
        progressWrap.style.display = 'none';
        showResult('success', '🎉 완료! 선생님이 확인 후 갤러리에 올려줄 거예요!');
        submitBtn.disabled = false;
        window.resetFile();
        document.getElementById('caption').value = '';
      }, 500);

    } catch (err) {
      showResult('error', '앗, 오류가 났어요. 다시 시도해봐요! 😢');
      submitBtn.disabled = false;
      document.getElementById('progressWrap').style.display = 'none';
    }
  };

  function showResult(type, msg) {
    const box = document.getElementById('resultBox');
    box.className = 'result-box ' + type;
    box.innerHTML = msg;
    box.style.display = 'block';
  }
</script>
</body>
</html>
