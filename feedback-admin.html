<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음의 소리 · DRB 재무팀</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-deep:   #2e5c30;
  --green-mid:    #4a8c4c;
  --green-soft:   #6aaa6c;
  --green-pale:   #e8f5e8;
  --border:       rgba(80,130,80,0.22);
  --border-strong:rgba(60,100,60,0.40);
  --text:         #1e3a1e;
  --muted:        #4a6e4a;
  --faint:        #7a9e7a;
  --glass:        rgba(255,255,255,0.78);
  --glass-strong: rgba(255,255,255,0.92);
  --surface:      rgba(255,255,255,0.55);
  --danger:       #c0392b;
  --danger-bg:    rgba(253,245,245,0.9);
  --adopted:      #2a6e3a;
  --adopted-bg:   rgba(232,248,236,0.9);
  --adopted-border:rgba(140,200,150,0.6);
  --radius:       10px;
}
html { font-size: 14px; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  color: var(--text); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* GIF 배경 */
.bg { position: fixed; inset: 0; z-index: 0; background: url('bamboo.gif') center center / cover no-repeat; }
.bg-overlay { position: fixed; inset: 0; z-index: 1; background: rgba(235,248,230,0.42); backdrop-filter: blur(1px); }

/* 헤더 */
.header {
  position: sticky; top: 0; z-index: 100; height: 72px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 960px; margin: 0 auto; padding: 0 24px; height: 72px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--green-soft); }
.header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.live-badge {
  display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted);
  border: 1px solid var(--border); border-radius: 999px; padding: 5px 14px;
  background: rgba(255,255,255,0.7);
}
.live-dot { width:6px; height:6px; border-radius:50%; background:#3a8a3c; animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 메인 */
.main { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; position: relative; z-index: 2; }

/* 툴바 */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  font-size: 12px; font-weight: 600; font-family: inherit; border-radius: 999px;
  padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.7); color: var(--muted);
  backdrop-filter: blur(8px);
}
.pill:hover { border-color: var(--green-mid); color: var(--green-deep); background: rgba(255,255,255,0.88); }
.pill.active { background: var(--green-deep); border-color: var(--green-deep); color: #fff; }
.pill-count { font-weight: 400; opacity: 0.8; margin-left: 2px; }
.count-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.count-label strong { color: var(--text); font-weight: 700; }

/* 테이블 래퍼 */
.table-glass {
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.65);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(40,80,40,0.10);
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.5); }
thead th {
  text-align: center;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--faint); padding: 12px 12px;
}
thead th:first-child { padding-left: 20px; }
thead th.th-title { text-align: left; }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer; }
tbody tr:hover { background: rgba(255,255,255,0.6); }
tbody tr.selected { background: rgba(180,230,180,0.35); }
tbody tr:last-child { border-bottom: none; }

td { padding: 13px 12px; font-size: 13px; vertical-align: middle; text-align: center; }
td:first-child { padding-left: 20px; }
td.td-title { text-align: left; }

.col-date { width: 110px; color: var(--faint); font-size: 12px; }
.col-cat  { width: 110px; }
.col-act  { width: 120px; }

/* 분류 뱃지 */
.cat-badge {
  display: inline-block; font-size: 11px; font-weight: 600; border-radius: 5px;
  padding: 3px 8px; white-space: nowrap;
}
.cat-애로고충 { background: #fff0f0; color: #c06060; border: 1px solid #f5d5d5; }
.cat-건의제안 { background: #edf3ff; color: #4a72b8; border: 1px solid #c8d8f5; }
.cat-자유의견 { background: #edf7ee; color: #3a7a40; border: 1px solid #b8dfc0; }

/* 제목 + 채택 */
.title-wrap { display: flex; align-items: center; gap: 8px; }
.title-text  { font-size: 13px; font-weight: 500; color: var(--text); }
.adopted-badge { display: inline-flex; align-items: center; font-size: 15px; flex-shrink: 0; }

/* 행 액션 */
.row-actions { display: none; gap: 6px; align-items: center; justify-content: center; }
tr.selected .row-actions { display: flex; }
.act-btn {
  font-size: 11px; font-weight: 600; font-family: inherit; border-radius: 999px;
  padding: 5px 12px; cursor: pointer; transition: all 0.12s;
  white-space: nowrap; border: 1px solid var(--border);
  background: rgba(255,255,255,0.8); color: var(--text);
}
.act-btn:hover { border-color: var(--border-strong); }
.act-btn.del { color: var(--danger); }
.act-btn.del:hover { border-color: var(--danger); background: var(--danger-bg); }

.empty { text-align: center; padding: 72px 0; color: var(--faint); font-size: 13px; }

/* 모달 */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(20,50,20,0.35); z-index: 200;
  align-items: center; justify-content: center; padding: 24px;
  backdrop-filter: blur(3px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--glass-strong);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 16px; width: 100%; max-width: 560px; height: 640px;
  display: flex; flex-direction: column;
  box-shadow: 0 12px 48px rgba(30,70,30,0.18);
  animation: fadeUp 0.18s ease; overflow: hidden;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

.modal-head { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.modal-date { font-size: 11px; color: var(--faint); }
.modal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.4; color: var(--text); }

.modal-body-wrap {
  flex: 1; padding: 20px 24px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: transparent transparent;
}
.modal-body-wrap:hover { scrollbar-color: rgba(80,140,80,0.25) transparent; }
.modal-body-wrap::-webkit-scrollbar { width: 4px; }
.modal-body-wrap::-webkit-scrollbar-track { background: transparent; }
.modal-body-wrap::-webkit-scrollbar-thumb { background: transparent; border-radius: 2px; }
.modal-body-wrap:hover::-webkit-scrollbar-thumb { background: rgba(80,140,80,0.25); }
.modal-body { font-size: 14px; line-height: 1.85; color: var(--muted); white-space: pre-wrap; word-break: keep-all; }

.modal-footer {
  padding: 16px 24px 20px; display: flex; justify-content: flex-end; gap: 8px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.btn-close, .btn-adopt {
  font-size: 13px; font-family: inherit; font-weight: 600;
  border: 1px solid var(--border); border-radius: 999px; padding: 8px 20px;
  background: rgba(255,255,255,0.7); color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.btn-close:hover { border-color: var(--green-mid); color: var(--green-deep); background: rgba(255,255,255,0.9); }
.btn-adopt:hover { border-color: var(--adopted); color: var(--adopted); background: var(--adopted-bg); }
.btn-adopt.is-adopted { border-color: var(--adopted-border); color: var(--adopted); background: var(--adopted-bg); }
.btn-adopt.is-adopted:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

/* 토스트 */
.toast {
  display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(30,58,30,0.92); backdrop-filter: blur(12px);
  color: #fff; border-radius: 999px; padding: 12px 20px;
  font-size: 13px; font-weight: 500; align-items: center; gap: 14px;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(30,70,30,0.25); z-index: 300;
}
.toast.visible { display: flex; }
.toast-btns { display: flex; gap: 8px; }
.t-btn { font-size: 12px; font-family: inherit; font-weight: 700; border-radius: 999px; padding: 5px 14px; cursor: pointer; border: none; }
.t-btn.cancel { background: rgba(255,255,255,0.15); color: #fff; }
.t-btn.cancel:hover { background: rgba(255,255,255,0.25); }
.t-btn.ok { background: #e74c3c; color: #fff; }
.t-btn.ok:hover { background: var(--danger); }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <span class="header-eyebrow">DRB 재무팀 대나무 숲</span>
      <span class="header-title">마음의 소리</span>
    </div>
    <div class="live-badge"><span class="live-dot"></span>실시간 연동</div>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <div class="filter-group">
      <button class="pill active" data-cat="전체">전체<span class="pill-count" id="pc-전체"></span></button>
      <button class="pill" data-cat="애로·고충">애로·고충<span class="pill-count" id="pc-애로고충"></span></button>
      <button class="pill" data-cat="건의·제안">건의·제안<span class="pill-count" id="pc-건의제안"></span></button>
      <button class="pill" data-cat="자유의견">자유의견<span class="pill-count" id="pc-자유의견"></span></button>
    </div>
    <div class="count-label">총 <strong id="count-label">0</strong>건</div>
  </div>

  <div class="table-glass">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-date">게시일</th>
            <th class="col-cat">분류</th>
            <th class="th-title">제목</th>
            <th class="col-act"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">등록된 의견이 없습니다.</div>
    </div>
  </div>
</main>

<!-- 삭제 토스트 -->
<div class="toast" id="toast">
  <span>이 의견을 삭제하시겠습니까?</span>
  <div class="toast-btns">
    <button class="t-btn cancel" id="t-cancel">취소</button>
    <button class="t-btn ok"     id="t-ok">삭제</button>
  </div>
</div>

<!-- 상세 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-meta">
        <span class="cat-badge" id="m-cat"></span>
        <span class="modal-date" id="m-date"></span>
        <span class="adopted-badge" id="m-adopted-badge" style="display:none">👍</span>
      </div>
      <div class="modal-title" id="m-title"></div>
    </div>
    <div class="modal-body-wrap">
      <div class="modal-body" id="m-body"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-adopt" id="btn-adopt">👍 좋아요</button>
      <button class="btn-close" id="btn-close">닫기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {
  apiKey: "AIzaSyA5da127Wmh6cbDIk0gTr2uwtj5zP-9v08",
  authDomain: "drbworld.firebaseapp.com",
  databaseURL: "https://drbworld-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "drbworld", storageBucket: "drbworld.firebasestorage.app",
  messagingSenderId: "692323820655", appId: "1:692323820655:web:d38af1a32ddc01001c999a"
};
const app = initializeApp(cfg);
const db  = getDatabase(app);

let allPosts = [], currentFilter = '전체', selectedId = null, pendingDelId = null, modalId = null;

onValue(ref(db,'feedback'), snap => {
  const data = snap.val();
  allPosts = data
    ? Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))
    : [];
  updateCounts(); render();
  if (modalId) refreshModal(modalId);
});

function updateCounts() {
  const total = allPosts.length;
  document.getElementById('pc-전체').textContent = total ? `(${total})` : '';
  ['애로·고충','건의·제안','자유의견'].forEach(cat => {
    const key = cat.replace(/[·\-\s]/g,'');
    const n = allPosts.filter(p=>p.category===cat).length;
    document.getElementById(`pc-${key}`).textContent = n ? `(${n})` : '';
  });
}

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.cat;
    document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b===btn));
    selectedId = null; render();
  });
});

function render() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const filtered = currentFilter==='전체' ? allPosts : allPosts.filter(p=>p.category===currentFilter);
  document.getElementById('count-label').textContent = filtered.length;
  if (!filtered.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const date = p.timestamp ? new Date(p.timestamp).toISOString().slice(0,10) : '—';
    const sel  = selectedId===p.id ? ' selected' : '';
    const ck   = catClass(p.category||'');
    const adoptedBadge = p.adopted ? `<span class="adopted-badge">👍</span>` : '';
    return `<tr data-id="${p.id}" class="${sel}">
      <td class="col-date">${date}</td>
      <td class="col-cat"><span class="cat-badge ${ck}">${esc(p.category||'—')}</span></td>
      <td class="td-title"><div class="title-wrap"><span class="title-text">${esc(p.title)}</span>${adoptedBadge}</div></td>
      <td class="col-act">
        <div class="row-actions">
          <button class="act-btn view" data-id="${p.id}">보기</button>
          <button class="act-btn del"  data-id="${p.id}">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.classList.contains('act-btn')) return;
      selectedId = selectedId===row.dataset.id ? null : row.dataset.id;
      render();
    });
  });
  tbody.querySelectorAll('.act-btn.view').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); openModal(btn.dataset.id); })
  );
  tbody.querySelectorAll('.act-btn.del').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); requestDelete(btn.dataset.id); })
  );
}

function openModal(id) { modalId=id; refreshModal(id); document.getElementById('overlay').classList.add('open'); }

function refreshModal(id) {
  const p = allPosts.find(x=>x.id===id); if (!p) return;
  const date = p.timestamp ? new Date(p.timestamp).toISOString().slice(0,10) : '—';
  const ck = catClass(p.category||'');
  document.getElementById('m-cat').textContent = p.category||'—';
  document.getElementById('m-cat').className   = `cat-badge ${ck}`;
  document.getElementById('m-date').textContent  = date;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-body').textContent  = p.body;
  const adoptBadge = document.getElementById('m-adopted-badge');
  const adoptBtn   = document.getElementById('btn-adopt');
  if (p.adopted) {
    adoptBadge.style.display='inline-flex';
    adoptBtn.classList.add('is-adopted'); adoptBtn.textContent='👍 좋아요';
  } else {
    adoptBadge.style.display='none';
    adoptBtn.classList.remove('is-adopted'); adoptBtn.textContent='👍 좋아요';
  }
}

document.getElementById('btn-adopt').addEventListener('click', async () => {
  if (!modalId) return;
  const p = allPosts.find(x=>x.id===modalId); if (!p) return;
  await update(ref(db,`feedback/${modalId}`), { adopted: !p.adopted });
});
document.getElementById('btn-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open'); modalId=null;
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target===document.getElementById('overlay')) { document.getElementById('overlay').classList.remove('open'); modalId=null; }
});

function requestDelete(id) { pendingDelId=id; document.getElementById('toast').classList.add('visible'); }
document.getElementById('t-cancel').addEventListener('click', () => { pendingDelId=null; document.getElementById('toast').classList.remove('visible'); });
document.getElementById('t-ok').addEventListener('click', async () => {
  if (!pendingDelId) return;
  await remove(ref(db,`feedback/${pendingDelId}`));
  if (selectedId===pendingDelId) selectedId=null;
  pendingDelId=null; document.getElementById('toast').classList.remove('visible');
});

function catClass(cat) {
  if (cat==='애로·고충') return 'cat-애로고충';
  if (cat==='건의·제안') return 'cat-건의제안';
  if (cat==='자유의견')  return 'cat-자유의견';
  return '';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
