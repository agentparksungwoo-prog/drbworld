<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음의 소리 · DRB 재무팀</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --surface:#f6f6f6;
  --border:#e5e5e5; --border-strong:#c8c8c8;
  --text:#111111; --muted:#666666; --faint:#aaaaaa;
  --danger:#c0392b; --danger-bg:#fdf5f5;
  --adopted:#1a6b3a; --adopted-bg:#edf7f1; --adopted-border:#b2dfc4;
  --radius:8px;
}
html { font-size: 14px; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* 헤더 */
.header {
  border-bottom: 1px solid var(--border); height: 72px;
  position: sticky; top: 0; z-index: 100; background: var(--bg);
}
.header-inner {
  max-width: 960px; margin: 0 auto; padding: 0 24px; height: 72px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.header-sub { font-size: 12px; color: var(--faint); margin-top: 2px; }
.live-badge {
  display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--faint);
  border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px;
}
.live-dot { width:6px; height:6px; border-radius:50%; background:#2a7a4f; animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 메인 — 헤더와 동일한 24px */
.main { max-width: 960px; margin: 0 auto; padding: 32px 24px 60px; }

/* 툴바 */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
}
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  font-size: 12px; font-weight: 500; font-family: inherit; border-radius: 999px;
  padding: 6px 14px; cursor: pointer; transition: all 0.12s;
  border: 1px solid var(--border); background: var(--bg); color: var(--muted);
}
.pill:hover { border-color: var(--border-strong); color: var(--text); }
.pill.active { background: #111; border-color: #111; color: #fff; }
.pill-count { font-weight: 400; opacity: 0.75; margin-left: 2px; }
.count-label { font-size: 12px; color: var(--faint); white-space: nowrap; }
.count-label strong { color: var(--text); font-weight: 600; }

/* 테이블 */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border-strong); }
thead th {
  text-align: center;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--faint); padding: 0 12px 10px;
}
thead th.th-title { text-align: left; }
thead th:first-child { padding-left: 0; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s; cursor: pointer;
}
tbody tr:hover { background: #f5fbf6; }
tbody tr.selected { background: #e8f5ea; }
tbody tr:last-child { border-bottom: none; }

td {
  padding: 13px 12px; font-size: 13px; vertical-align: middle; text-align: center;
}
td:first-child { padding-left: 0; }
td.td-title { text-align: left; }

.col-date { width: 110px; color: var(--faint); font-size: 12px; }
.col-cat  { width: 110px; }
.col-act  { width: 120px; }

.cat-badge {
  display: inline-block; font-size: 11px; font-weight: 500; border-radius: 4px;
  padding: 3px 8px; white-space: nowrap;
}
/* 노션 스타일 — 채도 낮은 파스텔 */
.cat-애로고충 { background: #fff0f0; color: #c06060; border: 1px solid #f5d5d5; }
.cat-건의제안 { background: #e8f0fe; color: #3a5fb0; border: 1px solid #c3d3f7; }
.cat-자유의견 { background: #e9f5ee; color: #2d7a50; border: 1px solid #b8dfc8; }

/* 제목 + 채택 뱃지 */
.title-wrap { display: flex; align-items: center; gap: 8px; }
.title-text { font-size: 13px; font-weight: 500; color: var(--text); }
.adopted-badge {
  display: inline-flex; align-items: center;
  font-size: 16px;
  border-radius: 4px; padding: 1px 4px; white-space: nowrap; flex-shrink: 0;
}

/* 행 액션 버튼 */
.row-actions { display: none; gap: 6px; align-items: center; justify-content: center; }
tr.selected .row-actions { display: flex; }
.act-btn {
  font-size: 11px; font-weight: 600; font-family: inherit;
  border-radius: 999px; padding: 5px 12px; cursor: pointer; transition: all 0.12s;
  white-space: nowrap; border: 1px solid var(--border); background: var(--bg); color: var(--text);
}
.act-btn:hover { border-color: var(--border-strong); }
.act-btn.del { color: var(--danger); }
.act-btn.del:hover { border-color: var(--danger); background: var(--danger-bg); }

.empty { text-align: center; padding: 72px 0; color: var(--faint); font-size: 13px; }

/* 상세 모달 */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.28); z-index: 200;
  align-items: center; justify-content: center; padding: 24px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 560px;
  height: 640px;                      /* 고정 높이 */
  display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); animation: fadeUp 0.18s ease;
  overflow: hidden;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

.modal-head { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.modal-date { font-size: 11px; color: var(--faint); }
.modal-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; line-height: 1.4; }

/* 본문 — 남은 공간 모두 차지, 스크롤 */
.modal-body-wrap {
  flex: 1;
  padding: 20px 24px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: transparent transparent;
}
.modal-body-wrap:hover {
  scrollbar-color: rgba(0,0,0,0.15) transparent;
}
.modal-body-wrap::-webkit-scrollbar { width: 4px; }
.modal-body-wrap::-webkit-scrollbar-track { background: transparent; }
.modal-body-wrap::-webkit-scrollbar-thumb { background: transparent; border-radius: 2px; }
.modal-body-wrap:hover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
.modal-body { font-size: 14px; line-height: 1.85; color: var(--muted); white-space: pre-wrap; word-break: keep-all; }

/* 채택 버튼 — 닫기와 동일 베이스 */
.modal-footer {
  padding: 16px 24px 20px; display: flex; justify-content: flex-end; gap: 8px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.btn-close, .btn-adopt {
  font-size: 13px; font-family: inherit; font-weight: 500;
  border: 1px solid var(--border); border-radius: 999px; padding: 8px 20px;
  background: none; color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.btn-close:hover { border-color: #111; color: #111; }
.btn-adopt:hover { border-color: var(--adopted); color: var(--adopted); background: var(--adopted-bg); }
.btn-adopt.is-adopted { border-color: var(--adopted-border); color: var(--adopted); background: var(--adopted-bg); }
.btn-adopt.is-adopted:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

/* 삭제 확인 토스트 */
.toast {
  display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #111; color: #fff; border-radius: 999px;
  padding: 12px 20px; font-size: 13px; font-weight: 500;
  align-items: center; gap: 14px; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18); z-index: 300;
}
.toast.visible { display: flex; }
.toast-btns { display: flex; gap: 8px; }
.t-btn {
  font-size: 12px; font-family: inherit; font-weight: 600;
  border-radius: 999px; padding: 5px 14px; cursor: pointer; border: none;
}
.t-btn.cancel { background: rgba(255,255,255,0.15); color: #fff; }
.t-btn.cancel:hover { background: rgba(255,255,255,0.25); }
.t-btn.ok { background: #e74c3c; color: #fff; }
.t-btn.ok:hover { background: var(--danger); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="header-title">마음의 소리</div>
      <div class="header-sub">DRB 재무팀 · 관리자</div>
    </div>
    <div class="live-badge"><span class="live-dot"></span>실시간 연동</div>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <div class="filter-group">
      <button class="pill active" data-cat="전체">전체<span class="pill-count" id="pc-전체"></span></button>
      <button class="pill" data-cat="애로·고충">애로·고충<span class="pill-count" id="pc-애로고충"></span></button>
      <button class="pill" data-cat="건의·제안">건의·제안<span class="pill-count" id="pc-건의제안"></span></button>
      <button class="pill" data-cat="자유의견">자유의견<span class="pill-count" id="pc-자유의견"></span></button>
    </div>
    <div class="count-label">총 <strong id="count-label">0</strong>건</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-date">게시일</th>
          <th class="col-cat">분류</th>
          <th class="th-title">제목</th>
          <th class="col-act"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">등록된 의견이 없습니다.</div>
  </div>
</main>

<!-- 삭제 확인 토스트 -->
<div class="toast" id="toast">
  <span>이 의견을 삭제하시겠습니까?</span>
  <div class="toast-btns">
    <button class="t-btn cancel" id="t-cancel">취소</button>
    <button class="t-btn ok"     id="t-ok">삭제</button>
  </div>
</div>

<!-- 상세 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-meta">
        <span class="cat-badge" id="m-cat"></span>
        <span class="modal-date" id="m-date"></span>
        <span class="adopted-badge" id="m-adopted-badge" style="display:none" title="채택됨">👍</span>
      </div>
      <div class="modal-title" id="m-title"></div>
    </div>
    <div class="modal-body-wrap">
      <div class="modal-body" id="m-body"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-adopt" id="btn-adopt">👍 좋아요</button>
      <button class="btn-close" id="btn-close">닫기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {
  apiKey: "AIzaSyA5da127Wmh6cbDIk0gTr2uwtj5zP-9v08",
  authDomain: "drbworld.firebaseapp.com",
  databaseURL: "https://drbworld-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "drbworld",
  storageBucket: "drbworld.firebasestorage.app",
  messagingSenderId: "692323820655",
  appId: "1:692323820655:web:d38af1a32ddc01001c999a"
};
const app = initializeApp(cfg);
const db  = getDatabase(app);

let allPosts      = [];
let currentFilter = '전체';
let selectedId    = null;
let pendingDelId  = null;
let modalId       = null;

// ── 실시간 수신 ──
onValue(ref(db, 'feedback'), snap => {
  const data = snap.val();
  allPosts = data
    ? Object.entries(data).map(([id,v]) => ({id,...v}))
        .sort((a,b) => (b.timestamp||0)-(a.timestamp||0))
    : [];
  updateCounts();
  render();
  // 모달 열려있으면 채택 상태 갱신
  if (modalId) refreshModal(modalId);
});

// ── 카운트 업데이트 ──
function updateCounts() {
  const total = allPosts.length;
  const cats  = ['애로·고충','건의·제안','자유의견'];
  document.getElementById('pc-전체').textContent = total ? `(${total})` : '';
  cats.forEach(cat => {
    const key = cat.replace(/[·\-\s]/g,'');
    const n   = allPosts.filter(p => p.category === cat).length;
    document.getElementById(`pc-${key}`).textContent = n ? `(${n})` : '';
  });
}

// ── 필터 ──
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.cat;
    document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b===btn));
    selectedId = null;
    render();
  });
});

// ── 렌더링 ──
function render() {
  const tbody  = document.getElementById('tbody');
  const empty  = document.getElementById('empty');
  const filtered = currentFilter === '전체'
    ? allPosts
    : allPosts.filter(p => p.category === currentFilter);

  document.getElementById('count-label').textContent = filtered.length;

  if (!filtered.length) {
    tbody.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const date = p.timestamp ? new Date(p.timestamp).toISOString().slice(0,10) : '—';
    const sel  = selectedId === p.id ? ' selected' : '';
    const adoptedBadge = p.adopted
      ? `<span class="adopted-badge" title="채택됨">👍</span>` : '';
    return `<tr data-id="${p.id}" class="${sel}">
      <td class="col-date">${date}</td>
      <td class="col-cat"><span class="cat-badge ${catClass(p.category||'')}">${esc(p.category||'—')}</span></td>
      <td class="td-title">
        <div class="title-wrap">
          <span class="title-text">${esc(p.title)}</span>
          ${adoptedBadge}
        </div>
      </td>
      <td class="col-act">
        <div class="row-actions">
          <button class="act-btn view" data-id="${p.id}">보기</button>
          <button class="act-btn del"  data-id="${p.id}">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.classList.contains('act-btn')) return;
      const id = row.dataset.id;
      selectedId = selectedId === id ? null : id;
      render();
    });
  });
  tbody.querySelectorAll('.act-btn.view').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); openModal(btn.dataset.id); })
  );
  tbody.querySelectorAll('.act-btn.del').forEach(btn =>
    btn.addEventListener('click', e => { e.stopPropagation(); requestDelete(btn.dataset.id); })
  );
}

// ── 모달 ──
function openModal(id) {
  modalId = id;
  refreshModal(id);
  document.getElementById('overlay').classList.add('open');
}

function refreshModal(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p) return;
  const date = p.timestamp ? new Date(p.timestamp).toISOString().slice(0,10) : '—';
  document.getElementById('m-cat').textContent   = p.category || '—';
  document.getElementById('m-cat').className      = `cat-badge ${catClass(p.category||'')}`;
  document.getElementById('m-date').textContent  = date;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-body').textContent  = p.body;

  const adoptBadge = document.getElementById('m-adopted-badge');
  const adoptBtn   = document.getElementById('btn-adopt');

  if (p.adopted) {
    adoptBadge.style.display = 'inline-flex';
    adoptBtn.classList.add('is-adopted');
    adoptBtn.textContent = '👍 좋아요';
  } else {
    adoptBadge.style.display = 'none';
    adoptBtn.classList.remove('is-adopted');
    adoptBtn.textContent = '👍 좋아요';
  }
}

document.getElementById('btn-adopt').addEventListener('click', async () => {
  if (!modalId) return;
  const p = allPosts.find(x => x.id === modalId);
  if (!p) return;
  await update(ref(db, `feedback/${modalId}`), { adopted: !p.adopted });
});

document.getElementById('btn-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
  modalId = null;
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    modalId = null;
  }
});

// ── 삭제 ──
function requestDelete(id) {
  pendingDelId = id;
  document.getElementById('toast').classList.add('visible');
}
document.getElementById('t-cancel').addEventListener('click', () => {
  pendingDelId = null;
  document.getElementById('toast').classList.remove('visible');
});
document.getElementById('t-ok').addEventListener('click', async () => {
  if (!pendingDelId) return;
  await remove(ref(db, `feedback/${pendingDelId}`));
  if (selectedId === pendingDelId) selectedId = null;
  pendingDelId = null;
  document.getElementById('toast').classList.remove('visible');
});

function catClass(cat) {
  if (cat === '애로·고충') return 'cat-애로고충';
  if (cat === '건의·제안') return 'cat-건의제안';
  if (cat === '자유의견')  return 'cat-자유의견';
  return '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
