<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRB 갤러리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8f8f6;
    --surface: #ffffff;
    --border: #e4e4e0;
    --text-primary: #111110;
    --text-secondary: #6b6b67;
    --text-muted: #a8a8a4;
    --accent: #111110;
    --badge-pending: #f0ede8;
    --font: 'Segoe UI', 'Malgun Gothic', sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text-primary);
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .header-meta {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Hero */
  .hero {
    padding: 64px 40px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .hero-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .hero-sub {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* Filter bar */
  .filter-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .count-badge {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Gallery Grid */
  .gallery-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    background: var(--border);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
    display: block;
  }

  .gallery-item:hover img {
    transform: scale(1.03);
  }

  .gallery-item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }

  .gallery-item:hover .gallery-item-overlay {
    opacity: 1;
  }

  .gallery-item-info {
    color: #fff;
  }

  .gallery-item-caption {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .gallery-item-date {
    font-size: 11px;
    opacity: 0.75;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 20px;
    opacity: 0.3;
  }

  .empty-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .empty-desc {
    font-size: 13px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .lightbox.open {
    display: flex;
  }

  .lightbox-inner {
    position: relative;
    max-width: 900px;
    width: 100%;
  }

  .lightbox-img {
    width: 100%;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .lightbox-caption {
    margin-top: 16px;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    text-align: center;
  }

  .lightbox-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    font-family: var(--font);
  }

  .lightbox-close:hover { color: #fff; }

  /* Upload FAB */
  .upload-fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 14px 24px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 200;
  }

  .upload-fab:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }

  @media (max-width: 600px) {
    header { padding: 0 20px; }
    .hero { padding: 40px 20px 32px; }
    .hero-title { font-size: 26px; }
    .filter-bar { padding: 0 20px 24px; }
    .gallery-wrap { padding: 0 20px 80px; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
    .upload-fab { bottom: 20px; right: 20px; padding: 12px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DRB <span>/ 재무팀 갤러리</span></div>
  <div class="header-meta" id="headerMeta">불러오는 중…</div>
</header>

<section class="hero">
  <div class="hero-eyebrow">Team Gallery</div>
  <div class="hero-title">우리 팀의 순간들</div>
  <div class="hero-sub">팀 활동, 행사, 일상의 기록을 함께 나눕니다.</div>
</section>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterGallery('all', this)">전체</button>
  <button class="filter-btn" onclick="filterGallery('행사', this)">행사</button>
  <button class="filter-btn" onclick="filterGallery('일상', this)">일상</button>
  <button class="filter-btn" onclick="filterGallery('기타', this)">기타</button>
  <span class="count-badge" id="countBadge"></span>
</div>

<div class="gallery-wrap">
  <div id="loadingState" class="loading">사진을 불러오는 중입니다…</div>
  <div class="gallery-grid" id="galleryGrid"></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-state-icon">📷</div>
    <div class="empty-title">아직 게시된 사진이 없습니다</div>
    <div class="empty-desc">QR코드로 사진을 업로드하면 관리자 승인 후 이곳에 표시됩니다.</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕ 닫기</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>
</div>

<a href="upload.html" class="upload-fab">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  사진 올리기
</a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpVYwXbGYxjD5qQkIkUdlDVSisLPYzvR8",
    authDomain: "gallery-228e7.firebaseapp.com",
    databaseURL: "https://gallery-228e7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gallery-228e7",
    storageBucket: "gallery-228e7.firebasestorage.app",
    messagingSenderId: "606056829643",
    appId: "1:606056829643:web:f78986e93d0dbb14c1814e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allPhotos = [];
  let currentFilter = 'all';

  const grid = document.getElementById('galleryGrid');
  const loadingState = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');
  const countBadge = document.getElementById('countBadge');
  const headerMeta = document.getElementById('headerMeta');

  const photosRef = ref(db, 'photos');

  onValue(photosRef, (snapshot) => {
    loadingState.style.display = 'none';
    allPhotos = [];

    if (snapshot.exists()) {
      snapshot.forEach((child) => {
        const data = child.val();
        if (data.status === 'approved') {
          allPhotos.push({ id: child.key, ...data });
        }
      });
      allPhotos.sort((a, b) => b.uploadedAt - a.uploadedAt);
    }

    renderGallery();
  });

  function renderGallery() {
    const filtered = currentFilter === 'all'
      ? allPhotos
      : allPhotos.filter(p => p.category === currentFilter);

    grid.innerHTML = '';
    countBadge.textContent = `${filtered.length}장`;
    headerMeta.textContent = `${allPhotos.length}장의 사진`;

    if (filtered.length === 0) {
      emptyState.style.display = 'block';
      return;
    }

    emptyState.style.display = 'none';

    filtered.forEach(photo => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${photo.imageUrl}" alt="${photo.caption || ''}" loading="lazy">
        <div class="gallery-item-overlay">
          <div class="gallery-item-info">
            ${photo.caption ? `<div class="gallery-item-caption">${photo.caption}</div>` : ''}
            <div class="gallery-item-date">${formatDate(photo.uploadedAt)}</div>
          </div>
        </div>
      `;
      item.addEventListener('click', () => openLightbox(photo));
      grid.appendChild(item);
    });
  }

  window.filterGallery = function(category, btn) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery();
  };

  function openLightbox(photo) {
    document.getElementById('lightboxImg').src = photo.imageUrl;
    document.getElementById('lightboxCaption').textContent =
      [photo.caption, formatDate(photo.uploadedAt)].filter(Boolean).join(' · ');
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  window.closeLightbox = function(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  };

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
</script>

</body>
</html>
