<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Haisley Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #fff9f0;
    --white: #ffffff;
    --ink: #3a2d1e;
    --ink-soft: #9a8878;
    --border: #f0e0cc;
    --accent: #ff8fab;
    --accent2: #ffb347;
    --accent3: #7ec8e3;
    --accent4: #b5ead7;
    --font: 'Gaegu', 'Nanum Gothic', cursive;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-family: var(--font);
    overscroll-behavior: none;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,249,240,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 2px dashed var(--border);
    height: 60px;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    padding: 0 12px;
  }

  .logo {
    grid-column: 2;
    font-family: var(--font);
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    text-decoration: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
  }

  .upload-link {
    grid-column: 3;
    justify-self: end;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 700;
    color: var(--white);
    background: var(--accent);
    text-decoration: none;
    white-space: nowrap;
    padding: 4px 10px;
    border-radius: 999px;
    border: 2px solid #ff6b9d;
    box-shadow: 0 2px 0 #e05580;
  }

  /* ── Feed ── */
  .feed {
    padding-top: 68px;
    padding-bottom: 60px;
  }

  /* 액자 스타일 */
  .feed-item {
    cursor: pointer;
    padding: 16px;
    -webkit-user-select: none;
    user-select: none;
  }

  .frame {
    background: var(--white);
    border-radius: 16px;
    border: 3px solid var(--border);
    overflow: hidden;
    box-shadow: 0 4px 0 #e8cdb0, 0 6px 16px rgba(0,0,0,0.07);
    position: relative;
  }



  .photo-wrap {
    width: 100%;
    background: #f5ede0;
    overflow: hidden;
  }

  .photo-wrap img {
    width: 100%;
    height: auto;
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .photo-wrap img.loaded { opacity: 1; }

  /* 캡션 영역 */
  .caption-row {
    padding: 12px 16px 14px;
    background: var(--white);
    border-top: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .caption-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
    flex: 1;
  }

  .caption-title {
    font-family: var(--font);
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .caption-date {
    font-size: 12px;
    font-family: var(--font);
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .caption-heart {
    font-size: 20px;
    flex-shrink: 0;
  }

  /* ── Empty ── */
  .empty {
    display: none;
    position: fixed;
    inset: 0;
    padding-top: 60px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
  .empty.show { display: flex; }
  .empty-icon { font-size: 56px; }
  .empty-title { font-size: 22px; font-weight: 700; color: var(--ink-soft); }
  .empty-hint { font-size: 14px; color: var(--ink-soft); }
  .empty-hint a { color: var(--accent); text-decoration: none; font-weight: 700; }

  /* ── Skeleton ── */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .skeleton-frame {
    background: var(--white);
    border-radius: 16px;
    border: 3px solid var(--border);
    overflow: hidden;
    box-shadow: 0 4px 0 #e8cdb0;
    margin: 16px;
  }

  .skeleton-img {
    background: linear-gradient(90deg, #f5ede0 25%, #ede0cc 50%, #f5ede0 75%);
    background-size: 400px 100%;
    animation: shimmer 1.6s infinite;
  }

  .skeleton-cap {
    padding: 12px 16px 14px;
    border-top: 2px dashed var(--border);
    display: flex;
    gap: 8px;
  }

  .skeleton-line {
    height: 14px; border-radius: 8px;
    background: linear-gradient(90deg, #f0e0cc 25%, #e8d0b8 50%, #f0e0cc 75%);
    background-size: 400px 100%;
    animation: shimmer 1.6s infinite;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(58,45,30,0.95);
    z-index: 500;
    display: none;
    flex-direction: column;
    overscroll-behavior: contain;
  }
  .lightbox.open { display: flex; }

  .lb-topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10; height: 60px;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: linear-gradient(to bottom, rgba(58,45,30,0.7), transparent);
  }

  .lb-counter {
    font-size: 13px; font-family: var(--font);
    color: rgba(255,249,240,0.8);
  }

  .lb-close-btn {
    background: var(--accent); border: 2px solid #ff6b9d;
    color: #fff; font-size: 13px; font-family: var(--font);
    font-weight: 700; padding: 5px 16px; border-radius: 999px;
    cursor: pointer; box-shadow: 0 2px 0 #e05580;
  }

  .lb-img-wrap {
    flex: 1; display: flex; align-items: center;
    justify-content: center; overflow: hidden;
  }

  .lb-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; pointer-events: none;
    transition: opacity 0.2s;
  }

  .lb-bottombar {
    padding: 16px 24px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(58,45,30,0.8), transparent);
    position: absolute; bottom: 0; left: 0; right: 0;
  }

  .lb-title {
    font-family: var(--font); font-weight: 700;
    font-size: 18px; color: #fff9f0; margin-bottom: 4px;
  }

  .lb-date {
    font-size: 12px; font-family: var(--font);
    color: rgba(255,249,240,0.6);
  }
</style>
</head>
<body>

<header>
  <span></span>
  <a class="logo" href="#">🌸 Haisley Gallery</a>
  <a class="upload-link" href="upload.html">✚ 올리기</a>
</header>

<div class="feed" id="feed">
  <div class="skeleton-frame">
    <div class="skeleton-img" style="height:60vw"></div>
    <div class="skeleton-cap">
      <div class="skeleton-line" style="width:45%;"></div>
      <div class="skeleton-line" style="width:25%;margin-left:auto;"></div>
    </div>
  </div>
  <div class="skeleton-frame">
    <div class="skeleton-img" style="height:72vw"></div>
    <div class="skeleton-cap">
      <div class="skeleton-line" style="width:55%;"></div>
      <div class="skeleton-line" style="width:20%;margin-left:auto;"></div>
    </div>
  </div>
</div>

<div class="empty" id="empty">
  <div class="empty-icon">📷</div>
  <div class="empty-title">아직 사진이 없어요!</div>
  <div class="empty-hint"><a href="upload.html">첫 번째 사진을 올려봐요 →</a></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-topbar">
    <span class="lb-counter" id="lbCounter"></span>
    <button class="lb-close-btn" onclick="closeLb()">✕ 닫기</button>
  </div>
  <div class="lb-img-wrap" id="lbImgWrap">
    <img id="lbImg" src="" alt="">
  </div>
  <div class="lb-bottombar">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-date" id="lbDate"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpVYwXbGYxjD5qQkIkUdlDVSisLPYzvR8",
    authDomain: "gallery-228e7.firebaseapp.com",
    databaseURL: "https://gallery-228e7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gallery-228e7",
    storageBucket: "gallery-228e7.firebasestorage.app",
    messagingSenderId: "606056829643",
    appId: "1:606056829643:web:f78986e93d0dbb14c1814e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let photos = [], lbIndex = 0;
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');
  const hearts = ['🌸','⭐','🌈','🍭','🎀','💛','🐣','🍓'];

  onValue(ref(db, 'photos'), (snapshot) => {
    photos = [];
    if (snapshot.exists()) {
      snapshot.forEach(child => {
        const d = child.val();
        if (d.status === 'approved') photos.push({ id: child.key, ...d });
      });
      photos.sort((a, b) => b.uploadedAt - a.uploadedAt);
    }
    render();
  });

  function render() {
    feed.innerHTML = '';
    if (photos.length === 0) { empty.classList.add('show'); return; }
    empty.classList.remove('show');

    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'feed-item';

      const frame = document.createElement('div');
      frame.className = 'frame';

      const wrap = document.createElement('div');
      wrap.className = 'photo-wrap';

      const img = document.createElement('img');
      img.src = photo.imageUrl;
      img.alt = photo.caption || '';
      img.loading = 'lazy';
      img.onload = () => img.classList.add('loaded');
      wrap.appendChild(img);

      const cap = document.createElement('div');
      cap.className = 'caption-row';
      cap.innerHTML = `
        <div class="caption-left">
          <div class="caption-title">${photo.caption || '제목 없음'}</div>
          <div class="caption-date">📅 ${formatDate(photo.uploadedAt)}</div>
        </div>
        <div class="caption-heart">${hearts[i % hearts.length]}</div>
      `;

      frame.appendChild(wrap);
      frame.appendChild(cap);
      item.appendChild(frame);
      item.addEventListener('click', () => openLb(i));
      feed.appendChild(item);
    });
  }

  window.openLb = function(i) {
    lbIndex = i;
    updateLb();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeLb = function() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  };

  function updateLb() {
    const p = photos[lbIndex];
    const img = document.getElementById('lbImg');
    img.style.opacity = '0';
    img.src = p.imageUrl;
    img.onload = () => { img.style.opacity = '1'; };
    document.getElementById('lbTitle').textContent = p.caption || '제목 없음';
    document.getElementById('lbDate').textContent = '📅 ' + formatDate(p.uploadedAt);
    document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${photos.length}`;
  }

  let touchStartX = 0, touchStartY = 0;
  const lbWrap = document.getElementById('lbImgWrap');
  lbWrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
  lbWrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      lbIndex = dx < 0 ? (lbIndex + 1) % photos.length : (lbIndex - 1 + photos.length) % photos.length;
      updateLb();
    } else if (Math.abs(dy) > 80 && Math.abs(dy) > Math.abs(dx)) { closeLb(); }
  }, { passive: true });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + photos.length) % photos.length; updateLb(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % photos.length; updateLb(); }
  });

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
</script>
</body>
</html>
