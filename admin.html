<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 · DRB 갤러리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8f8f6;
    --surface: #ffffff;
    --border: #e4e4e0;
    --text-primary: #111110;
    --text-secondary: #6b6b67;
    --text-muted: #a8a8a4;
    --accent: #111110;
    --green: #2d6a30;
    --green-bg: #edf7ed;
    --green-border: #c3e6c4;
    --red: #9b2222;
    --red-bg: #fdf0f0;
    --red-border: #f5c6c6;
    --yellow: #7a5c00;
    --yellow-bg: #fffbea;
    --yellow-border: #f0e08a;
    --font: 'Segoe UI', 'Malgun Gothic', sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .gallery-link {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
  }

  .gallery-link:hover { color: var(--text-primary); }

  /* Auth gate */
  .auth-gate {
    max-width: 400px;
    margin: 80px auto;
    padding: 0 20px;
    text-align: center;
  }

  .auth-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .auth-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  .auth-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
    text-align: center;
    letter-spacing: 3px;
    outline: none;
    margin-bottom: 12px;
  }

  .auth-input:focus { border-color: var(--accent); }

  .auth-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
  }

  .auth-error {
    font-size: 12px;
    color: var(--red);
    margin-top: 8px;
    display: none;
  }

  /* Main content */
  .main {
    display: none;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    flex: 1;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .stat-value.pending { color: var(--yellow); }
  .stat-value.approved { color: var(--green); }
  .stat-value.rejected { color: var(--red); }

  /* Section */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--yellow-bg);
    color: var(--yellow);
    border: 1px solid var(--yellow-border);
  }

  /* Card list */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 48px;
  }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 16px;
    transition: box-shadow 0.15s;
  }

  .photo-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .photo-thumb {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .photo-thumb:hover { opacity: 0.85; }

  .photo-meta {
    flex: 1;
    min-width: 0;
  }

  .photo-caption {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .photo-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .photo-status {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 6px;
  }

  .photo-status.pending {
    background: var(--yellow-bg);
    color: var(--yellow);
    border: 1px solid var(--yellow-border);
  }

  .photo-status.approved {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
  }

  .photo-status.rejected {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
  }

  .photo-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .action-btn {
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-approve {
    background: var(--green-bg);
    color: var(--green);
    border-color: var(--green-border);
  }

  .btn-approve:hover {
    background: var(--green);
    color: #fff;
  }

  .btn-reject {
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red-border);
  }

  .btn-reject:hover {
    background: var(--red);
    color: #fff;
  }

  .btn-delete {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border);
    font-size: 11px;
  }

  .btn-delete:hover {
    background: var(--red-bg);
    color: var(--red);
    border-color: var(--red-border);
  }

  /* Empty */
  .empty-note {
    font-size: 13px;
    color: var(--text-muted);
    padding: 32px 0;
    text-align: center;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .lightbox.open { display: flex; }

  .lightbox-inner { position: relative; max-width: 800px; width: 100%; }

  .lightbox-img {
    width: 100%;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .lightbox-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 18px;
    cursor: pointer;
    font-family: var(--font);
  }

  .lightbox-close:hover { color: #fff; }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .main { padding: 24px 16px 60px; }
    .stats-row { flex-direction: column; }
    .photo-card { flex-wrap: wrap; }
    .photo-actions { flex-direction: row; flex-wrap: wrap; width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DRB <span>/ 갤러리 관리</span></div>
  <div class="header-right">
    <a href="gallery.html" class="gallery-link">갤러리 보기 →</a>
  </div>
</header>

<!-- Auth Gate -->
<div id="authGate" class="auth-gate">
  <div class="auth-title">관리자 로그인</div>
  <div class="auth-desc">갤러리 관리자만 접근할 수 있습니다.</div>
  <input type="password" id="pwInput" class="auth-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="auth-btn" onclick="checkPw()">확인</button>
  <div class="auth-error" id="authError">비밀번호가 올바르지 않습니다.</div>
</div>

<!-- Main -->
<div id="mainContent" class="main">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">대기 중</div>
      <div class="stat-value pending" id="statPending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">승인됨</div>
      <div class="stat-value approved" id="statApproved">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">반려됨</div>
      <div class="stat-value rejected" id="statRejected">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">전체</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
  </div>

  <div class="section-title">
    승인 대기 <span class="pill" id="pendingPill">0</span>
  </div>
  <div class="card-list" id="pendingList"></div>

  <div class="section-title" style="margin-top:8px;">
    전체 사진
  </div>
  <div class="card-list" id="allList"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕ 닫기</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as sRef, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpVYwXbGYxjD5qQkIkUdlDVSisLPYzvR8",
    authDomain: "gallery-228e7.firebaseapp.com",
    databaseURL: "https://gallery-228e7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gallery-228e7",
    storageBucket: "gallery-228e7.firebasestorage.app",
    messagingSenderId: "606056829643",
    appId: "1:606056829643:web:f78986e93d0dbb14c1814e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);

  // ── 비밀번호 (필요 시 변경) ──
  const ADMIN_PW = 'drb2024';

  window.checkPw = function() {
    const val = document.getElementById('pwInput').value;
    if (val === ADMIN_PW) {
      document.getElementById('authGate').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      startListening();
    } else {
      document.getElementById('authError').style.display = 'block';
    }
  };

  function startListening() {
    const photosRef = ref(db, 'photos');
    onValue(photosRef, (snapshot) => {
      let all = [];
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          all.push({ id: child.key, ...child.val() });
        });
        all.sort((a, b) => b.uploadedAt - a.uploadedAt);
      }
      render(all);
    });
  }

  function render(all) {
    const pending = all.filter(p => p.status === 'pending');
    const approved = all.filter(p => p.status === 'approved');
    const rejected = all.filter(p => p.status === 'rejected');

    document.getElementById('statPending').textContent = pending.length;
    document.getElementById('statApproved').textContent = approved.length;
    document.getElementById('statRejected').textContent = rejected.length;
    document.getElementById('statTotal').textContent = all.length;
    document.getElementById('pendingPill').textContent = pending.length;

    renderList('pendingList', pending, true);
    renderList('allList', all, false);
  }

  function renderList(containerId, photos, isPending) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';

    if (photos.length === 0) {
      el.innerHTML = `<div class="empty-note">${isPending ? '대기 중인 사진이 없습니다.' : '사진이 없습니다.'}</div>`;
      return;
    }

    photos.forEach(photo => {
      const card = document.createElement('div');
      card.className = 'photo-card';

      const statusLabel = { pending: '대기 중', approved: '승인됨', rejected: '반려됨' };

      card.innerHTML = `
        <img class="photo-thumb" src="${photo.imageUrl}" alt="" onclick="openLightbox('${photo.imageUrl}')">
        <div class="photo-meta">
          <div class="photo-caption">${photo.caption || '(설명 없음)'}</div>
          <div class="photo-detail">업로더: ${photo.uploader || '익명'}</div>
          <div class="photo-detail">카테고리: ${photo.category || '기타'}</div>
          <div class="photo-detail">업로드: ${formatDate(photo.uploadedAt)}</div>
          <div class="photo-status ${photo.status}">${statusLabel[photo.status] || photo.status}</div>
        </div>
        <div class="photo-actions">
          ${photo.status !== 'approved' ? `<button class="action-btn btn-approve" onclick="updateStatus('${photo.id}', 'approved')">✓ 승인</button>` : ''}
          ${photo.status !== 'rejected' ? `<button class="action-btn btn-reject" onclick="updateStatus('${photo.id}', 'rejected')">✕ 반려</button>` : ''}
          <button class="action-btn btn-delete" onclick="deletePhoto('${photo.id}', '${photo.imageUrl}')">삭제</button>
        </div>
      `;
      el.appendChild(card);
    });
  }

  window.updateStatus = function(id, status) {
    update(ref(db, `photos/${id}`), { status });
  };

  window.deletePhoto = async function(id, imageUrl) {
    if (!confirm('사진을 영구 삭제합니다. 계속하시겠습니까?')) return;
    await remove(ref(db, `photos/${id}`));
    try {
      // Storage에서도 삭제 시도 (URL에서 경로 추출)
      const url = new URL(imageUrl);
      const pathMatch = decodeURIComponent(url.pathname).match(/\/o\/(.+)\?/);
      if (pathMatch) {
        const filePath = pathMatch[1];
        await deleteObject(sRef(storage, filePath));
      }
    } catch (e) { /* Storage 삭제 실패는 무시 */ }
  };

  window.openLightbox = function(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  };

  window.closeLightbox = function(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
  };

  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
</script>

</body>
</html>
